name: epassport_mobile
description: "ePassport mobile — gate scan + anonymous hazard reporting."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # i18n
  intl: any

  # Camera + QR
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2

  # Storage + secure
  flutter_secure_storage: ^9.2.2

  # Image processing — EXIF strip on hazard photos
  image: ^4.3.0

  # Network awareness (for v1.1 offline foundations)
  connectivity_plus: ^6.1.0

  # Permissions (camera, etc.)
  permission_handler: ^11.3.1

  # Idempotency-Key generation
  uuid: ^4.5.1

  # GPS for hazard reports
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
