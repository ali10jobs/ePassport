name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel any in-flight run for the same ref so PR-rebase pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Pest + Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: epassport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, pdo_pgsql, mbstring, exif, bcmath, zip, intl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-v2-${{ runner.os }}-php84-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-v2-${{ runner.os }}-php84-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=forge/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=ci_password/' .env

      - name: Migrate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: epassport_test
          DB_USERNAME: forge
          DB_PASSWORD: ci_password
        run: |
          set +e
          php artisan migrate --force --env=testing -vvv 2>&1 | tee /tmp/migrate.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            # Emit each non-empty line as an ::error:: annotation so the
            # failure surfaces via the check-runs API (which is public).
            grep -vE '^\s*$' /tmp/migrate.log | tail -40 | while IFS= read -r line; do
              # GH annotations limit to 4 KiB; trim aggressively
              echo "::error::$(echo "$line" | cut -c1-300)"
            done
          fi
          exit $rc

      - name: Test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: forge
          DB_PASSWORD: ci_password
        run: vendor/bin/pest

  mobile:
    name: Mobile (Flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

      - run: flutter test

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
