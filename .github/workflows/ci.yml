name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel any in-flight run for the same ref so PR-rebase pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Pest + Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: epassport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, pdo_pgsql, mbstring, exif, bcmath, zip, intl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-v2-${{ runner.os }}-php84-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-v2-${{ runner.os }}-php84-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
          # Point Laravel at the CI postgres service. We rewrite .env
          # explicitly (rather than relying on system-env override) so
          # both `artisan migrate` and the test runner agree.
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/'                .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/'                      .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=epassport_test/'    .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=postgres/'          .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=postgres/'          .env

      - name: Migrate
        run: php artisan migrate --force

      - name: Test
        run: vendor/bin/pest

  mobile:
    name: Mobile (Flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos

      - run: flutter test

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
