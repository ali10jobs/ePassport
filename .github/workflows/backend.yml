name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Pest + Larastan + Pint
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: epassport_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql, redis, gd, intl, bcmath, zip, mbstring
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare test env
        run: |
          cp .env.example .env
          php artisan key:generate
          # Override for CI's postgres service
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=forge/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=ci_password/' .env

      - name: Run migrations on test DB
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: epassport_test
          DB_USERNAME: forge
          DB_PASSWORD: ci_password
        run: php artisan migrate --force --env=testing

      - name: Pint (formatting check)
        run: ./vendor/bin/pint --test

      - name: Larastan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Pest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: forge
          DB_PASSWORD: ci_password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: ./vendor/bin/pest --colors=never
