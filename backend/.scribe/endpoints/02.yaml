name: 'Hazard Reports — Anonymous (public)'
description: |-

  Public endpoints for the anonymous reporter flow. No PII captured at the
  application layer:
    - no IP stored
    - no User-Agent / device fingerprint stored
    - no submitter_id column at the schema level (see migration)

  The handle returned is anonymous_report_id (random UUID); the submitter
  uses it to check status without authenticating.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/hazard-reports/anonymous
    metadata:
      custom: []
      groupName: 'Hazard Reports — Anonymous (public)'
      groupDescription: |-

        Public endpoints for the anonymous reporter flow. No PII captured at the
        application layer:
          - no IP stored
          - no User-Agent / device fingerprint stored
          - no submitter_id column at the schema level (see migration)

        The handle returned is anonymous_report_id (random UUID); the submitter
        uses it to check status without authenticating.
      subgroup: ''
      subgroupDescription: ''
      title: |-
        Submit an anonymous hazard report. Photo EXIF stripped server-side
        before storage.
      description: ''
      authenticated: false
      deprecated: false
    headers:
      Content-Type: multipart/form-data
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      photo:
        custom: []
        name: photo
        description: 'Must be a file. Must be an image. Must not be greater than 10240 kilobytes.'
        required: true
        example: null
        type: file
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      category:
        custom: []
        name: category
        description: ''
        required: true
        example: environmental
        type: string
        enumValues:
          - fall
          - electrical
          - fire
          - working_at_heights
          - lifting
          - housekeeping
          - ppe
          - environmental
          - other
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      severity:
        custom: []
        name: severity
        description: ''
        required: true
        example: high
        type: string
        enumValues:
          - low
          - medium
          - high
          - critical
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      description:
        custom: []
        name: description
        description: 'Must not be greater than 2000 characters.'
        required: false
        example: 'Eius et animi quos velit et.'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      description_lang:
        custom: []
        name: description_lang
        description: ''
        required: false
        example: ar
        type: string
        enumValues:
          - en
          - ar
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      project_id:
        custom: []
        name: project_id
        description: 'Must be a valid UUID. The <code>id</code> of an existing record in the projects table.'
        required: false
        example: 21c4122b-d554-3723-966c-6d723ea5293f
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      site_id:
        custom: []
        name: site_id
        description: 'Must be a valid UUID. The <code>id</code> of an existing record in the sites table.'
        required: false
        example: add3503c-ebff-3875-93af-b8c6a695762b
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      latitude:
        custom: []
        name: latitude
        description: 'Must be between -90 and 90.'
        required: false
        example: -89
        type: number
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      longitude:
        custom: []
        name: longitude
        description: 'Must be between -180 and 180.'
        required: false
        example: -180
        type: number
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
    cleanBodyParameters:
      category: environmental
      severity: high
      description: 'Eius et animi quos velit et.'
      description_lang: ar
      project_id: 21c4122b-d554-3723-966c-6d723ea5293f
