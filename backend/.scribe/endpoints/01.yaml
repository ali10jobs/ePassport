name: Authentication
description: |-

  Login flow supports two modes:

    mode=cookie (default): web SPA path. Caller must hit /sanctum/csrf-cookie
      first, then POST /auth/login with the XSRF-TOKEN header. Sanctum
      creates a session cookie; subsequent requests authenticate via cookie.

    mode=token: mobile + ERP path. Returns a fresh Sanctum personal access
      token. Caller stores the token (Keychain/Keystore for mobile) and
      sends it as Authorization: Bearer <token> on every request.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/auth/login
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: |-

        Login flow supports two modes:

          mode=cookie (default): web SPA path. Caller must hit /sanctum/csrf-cookie
            first, then POST /auth/login with the XSRF-TOKEN header. Sanctum
            creates a session cookie; subsequent requests authenticate via cookie.

          mode=token: mobile + ERP path. Returns a fresh Sanctum personal access
            token. Caller stores the token (Keychain/Keystore for mobile) and
            sends it as Authorization: Bearer <token> on every request.
      subgroup: ''
      subgroupDescription: ''
      title: 'Log in.'
      description: ''
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: 'Must be a valid email address.'
        required: true
        example: gbailey@example.net
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: ''
        required: true
        example: '|]|{+-'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      mode:
        custom: []
        name: mode
        description: ''
        required: false
        example: token
        type: string
        enumValues:
          - cookie
          - token
        exampleWasSpecified: false
        nullable: true
        deprecated: false
      device_name:
        custom: []
        name: device_name
        description: 'Must not be greater than 128 characters.'
        required: false
        example: v
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        deprecated: false
    cleanBodyParameters:
      email: gbailey@example.net
      password: '|]|{+-'
      mode: token
      device_name: v
    fileParameters: []
    responses: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/auth/logout
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: |-

        Login flow supports two modes:

          mode=cookie (default): web SPA path. Caller must hit /sanctum/csrf-cookie
            first, then POST /auth/login with the XSRF-TOKEN header. Sanctum
            creates a session cookie; subsequent requests authenticate via cookie.

          mode=token: mobile + ERP path. Returns a fresh Sanctum personal access
            token. Caller stores the token (Keychain/Keystore for mobile) and
            sends it as Authorization: Bearer <token> on every request.
      subgroup: ''
      subgroupDescription: ''
      title: 'Log out the current user.'
      description: |-
        For cookie sessions: invalidates and regenerates the session.
        For token auth: revokes the bearer token used for this request.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_KEY}'
      Content-Type: application/json
      Accept: application/json
